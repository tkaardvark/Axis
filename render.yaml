services:
  # Backend API (includes built-in scheduler for automated jobs)
  - type: web
    name: naia-analytics-api
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: naia-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22.22.0"
      - key: SEASON
        value: "2025-26"
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false

  # Frontend Static Site
  - type: web
    name: naia-analytics
    env: static
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: client/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://naia-analytics-api.onrender.com
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false

